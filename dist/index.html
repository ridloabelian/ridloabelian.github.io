        .container {

        h1 {

        .terminal {

            word-wrap: break-word;

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;

            transition: all 0.3s;
            font-family: 'Monaco', monospace;

        button:hover {
            background: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info {
            font-size: 0.8em;
            color: #aaa;
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.9em;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
<link rel="modulepreload" href="/ridlo_wasm-ca4181a38cab5d69.js" crossorigin="anonymous" integrity="sha384-Kv6eaRBZkYO4ITqPDDwABQ71udLqOwluz6JMWHEEEv+qI+TBrHb7jbDO0j+K/gYH"><link rel="preload" href="/ridlo_wasm-ca4181a38cab5d69_bg.wasm" crossorigin="anonymous" integrity="sha384-x0BqZzRwwj0FKeOlQRQ4GAHdrBg3ReaqDoRNoscKdqW+MlbD1UYfS6D8zwcuSxcU" as="fetch" type="application/wasm"></head>
<body>
    <a href="index-landing.html" class="back-link">← Back to Home</a>
    
    <div class="container">
        <h1>🚀 RIDLO WASM</h1>
        <div class="subtitle">Rust + WebAssembly Demo</div>
        
        <div class="terminal" id="output"></div>
        
        <div class="controls">
            <button id="btn-generate">Generate Activity</button>
            <button id="btn-clear">Clear</button>
        </div>
        
        <div class="info">
            💻 Running in your browser with WebAssembly
        </div>
    </div>
    
    <script>
        // Tunggu WASM module ter-load (Trunk export ke window.wasmBindings)
        async function waitForWasm() {
            let attempts = 0;
            while (attempts < 50) {
                if (typeof window.wasmBindings !== 'undefined' && 
                    typeof window.wasmBindings.generate_activity === 'function') {
                    console.log('✅ WASM module ready!');
                    setupButtons();
                    return;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
                attempts++;
            }
            console.error('❌ WASM module failed to load');
        }
        
        function setupButtons() {
            const outputEl = document.getElementById('output');
            const generateBtn = document.getElementById('btn-generate');
            const clearBtn = document.getElementById('btn-clear');
            
            generateBtn.addEventListener('click', () => {
                try {
                    const activity = window.wasmBindings.generate_activity();
                    outputEl.textContent += activity + '\n';
                    outputEl.scrollTop = outputEl.scrollHeight;
                    console.log('Activity generated');
                } catch (err) {
                    console.error('Error:', err);
                }
            });
            
            clearBtn.addEventListener('click', () => {
                outputEl.textContent = '';
            });
        }
        
        // Start waiting
        waitForWasm();
    </script>

<script type="module">
import init, * as bindings from '/ridlo_wasm-ca4181a38cab5d69.js';
const wasm = await init({ module_or_path: '/ridlo_wasm-ca4181a38cab5d69_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script></body>
</html>
